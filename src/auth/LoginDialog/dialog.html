<dialog
  id="auth-dialog"
  class="auth-dialog"
>
  <form method="dialog">
    <p>
      <input placeholder="Username" type="text" id="username" name="username" autocomplete="username" required>
    </p>
    <p>
      <input placeholder="Password" type="password" id="password" name="password" autocomplete="current-password" required>
    </p>
    <p>
      <button type="submit">Login</button>
    </p>
  </form>
</dialog>
